name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Generate Pacman
        uses: Platane/snk@v3
        with:
          github_user_name: vanumbre
          outputs: |
            dist/pacman.svg

      - name: Push Pacman
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
